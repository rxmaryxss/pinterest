<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>aquarusss ✿ coming soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blush: #f5e6e8;
      --petal: #e8d5d8;
      --rose: #c9a0a8;
      --dusty: #b08b94;
      --cream: #faf7f5;
      --text: #3d2c30;
      --muted: #9e8188;
      --white: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* floating blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      z-index: 0;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .blob1 { width: 400px; height: 400px; background: var(--petal); top: -100px; left: -100px; animation-delay: 0s; }
    .blob2 { width: 300px; height: 300px; background: #ddc5ca; bottom: -80px; right: -60px; animation-delay: 2s; }
    .blob3 { width: 200px; height: 200px; background: var(--blush); top: 40%; left: 60%; animation-delay: 4s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* main card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--petal);
      border-radius: 28px;
      padding: 56px 52px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 48px rgba(180,130,140,0.12);
      animation: floatIn 1s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .petal-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .petal-row span {
      font-size: 20px;
      animation: sway 3s ease-in-out infinite;
      opacity: 0.6;
    }
    .petal-row span:nth-child(2) { animation-delay: 0.25s; }
    .petal-row span:nth-child(3) { animation-delay: 0.5s; }
    .petal-row span:nth-child(4) { animation-delay: 0.75s; }
    .petal-row span:nth-child(5) { animation-delay: 1s; }

    @keyframes sway {
      0%, 100% { transform: rotate(-10deg) translateY(0); }
      50%       { transform: rotate(10deg) translateY(-5px); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: 0.04em;
      line-height: 1.15;
      color: var(--text);
    }
    h1 em { font-style: italic; color: var(--dusty); }

    .subtitle {
      margin-top: 10px;
      font-size: 0.76rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    /* divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
      opacity: 0.35;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--rose); }
    .divider span { font-size: 11px; color: var(--rose); }

    /* coming soon text */
    .coming-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--dusty);
      line-height: 1.7;
      margin-bottom: 8px;
    }

    .coming-sub {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* dots loader */
    .dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-bottom: 36px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--rose);
      animation: bounce 1.4s ease-in-out infinite;
      opacity: 0.6;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%           { transform: scale(1.15); opacity: 1; }
    }

    /* pinterest button */
    .pin-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 12px 28px;
      background: #e60023;
      color: white;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 18px rgba(230,0,35,0.22);
    }
    .pin-btn:hover {
      background: #c0001d;
      transform: translateY(-2px);
      box-shadow: 0 8px 26px rgba(230,0,35,0.3);
    }
    .pin-btn svg { width: 14px; height: 14px; fill: white; }

    /* footer note */
    .footnote {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      opacity: 0.5;
      z-index: 1;
    }
    .footnote span { color: var(--rose); }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="card">
    <div class="petal-row">
      <span>✿</span><span>✾</span><span>✿</span><span>✾</span><span>✿</span>
    </div>

    <h1>a q u a r u s s s<br><em>& her pins</em></h1>
    <p class="subtitle">a little corner of things i love</p>

    <div class="divider"><span>✦</span></div>

    <p class="coming-text">something pretty is on its way ✿</p>
    <p class="coming-sub">my full pinterest collection will live here soon —<br>curated, aesthetic, and all in one place.</p>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <a class="pin-btn" href="https://in.pinterest.com/aquarusss/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
      visit my pinterest
    </a>
  </div>

  <p class="footnote">made with <span>✿</span> &nbsp;·&nbsp; full site coming soon</p>

</body>
</html>
